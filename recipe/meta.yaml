{% set version = "1.3.46" %}

package:
  name: graphicsmagick
  version: {{ version }}

source:
  - url: https://sourceforge.net/projects/graphicsmagick/files/graphicsmagick/{{ version }}/GraphicsMagick-{{ version }}.tar.xz
    sha256: c7c706a505e9c6c3764156bb94a0c9644d79131785df15a89c9f8721d1abd061
    patches:
      - windows.patch  # [win]
  - path: CMakeLists.txt  # [win]

build:
  number: 0

requirements:
  build:
    - gnuconfig  # [unix]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - cmake  # [win]
    - ninja  # [win]
    - make  # [unix]
  host:
    - bzip2
    - libjpeg-turbo
    - libpng
    - freetype
    - libtiff
    - zlib
    - ghostscript  # [unix]
    - libwebp  # [unix]
    - libxml2-devel  # [unix]
    - zstd  # [unix]
    - xorg-libsm  # [linux]
    - xorg-libxext  # [linux]
    - xorg-libxdmcp  # [linux]
    - xorg-libxau  # [linux]
    - libgomp      # [linux]
    - liblzma-devel  # [linux]

  run:
    - bzip2  # [unix]
    - libjpeg-turbo   # [unix]
    - libpng
    - freetype
    - libtiff
    - zlib
    - ghostscript  # [unix]
    - libwebp  # [unix]
    - libxml2-devel  # [unix]
    - zstd  # [unix]
    - xorg-libsm  # [linux]
    - xorg-libxext  # [linux]
    - xorg-libx11  # [linux]
    - xorg-libice  # [linux]
    - liblzma-devel  # [linux]

test:
  commands:
    - gm -help
    - if not exist %LIBRARY_PREFIX%\\bin\\GraphicsMagick.dll exit 1  # [win]
    - if not exist %LIBRARY_PREFIX%\\bin\\GraphicsMagick++.dll exit 1  # [win]
    - if not exist %LIBRARY_PREFIX%\\bin\\GraphicsMagickWand.dll exit 1  # [win]

about:
  home: http://www.graphicsmagick.org/
  license: MIT
  license_file: Copyright.txt
  summary: GraphicsMagick is the swiss army knife of image processing

extra:
  recipe-maintainers:
    - bgruening
    - seanyen
    - ocefpaf
